{% comment %}
Post Card Organism
Usage: {% include organisms/post-card.html post=post %}
Parameters:
  - post: Post object (required)
{% endcomment %}

<a href="{{ include.post.url | relative_url }}" class="post-card">
  <div class="post-card-image-wrapper">
    {% if include.post.image %}
    <img src="{{ include.post.image | relative_url }}" alt="{{ include.post.title }}" class="post-card-image">
    {% else %}
    <div class="post-card-image-placeholder"></div>
    {% endif %}
    <div class="post-card-overlay"></div>
  </div>

  <div class="post-card-content">
    <h2 class="post-card-title">{{ include.post.title }}</h2>
    <time class="post-card-date" datetime="{{ include.post.date | date_to_xmlschema }}">{% include atoms/localized-date.html date=include.post.date %}</time>
  </div>
</a>

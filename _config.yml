# =============================================================================
# SITE CONFIGURATION
# =============================================================================
# This is the main configuration file for your Jekyll site.
# Edit the values below to customize your site.

# Basic Site Settings
title: "Esa Hakulinen"
description: "Digital marketing expertise, experiments, and insights. Building in public."
url: "https://esahakulinen.fi"
baseurl: ""
lang: fi

# Author Information
author:
  name: "Esa Hakulinen"
  email: ""  # Add your email if you want
  bio: "Digital marketer experimenting with projects and sharing expertise."
  # avatar: "/assets/images/author/profile.jpg"  # Uncomment when image is added
  # twitter: ""  # Uncomment and add handle when ready
  linkedin: "esahakulinen"
  github: "esaHak"

# Logo for Person/Organization schema (used by jekyll-seo-tag)
# logo: "/assets/images/author/profile.jpg"  # Uncomment when image is added

# Social links for sameAs schema property (used by jekyll-seo-tag)
social:
  name: "Esa Hakulinen"
  links:
    - https://www.linkedin.com/in/esahakulinen
    - https://github.com/esaHak

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

# Collections - These are the different content types on your site
# Each collection can have its own folder and layout
collections:
  projects:
    output: true
    permalink: /projects/:name/
  seo_pages:
    output: false

# Default front matter for different content types
# This saves you from repeating the same settings in every file
defaults:
  # Blog posts
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "Admin"
      image: /assets/images/og/blog-default.webp
  # Projects
  - scope:
      path: "_projects"
      type: "projects"
    values:
      layout: "project"
      image: /assets/images/og/projects-default.webp
  # SEO Pages
  - scope:
      path: "_seo_pages"
      type: "seo_pages"
    values:
      layout: "seo_page"
  # Regular pages
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-polyglot
  - jekyll-seo-tag

# Multi-language configuration (jekyll-polyglot)
languages: ["fi", "en"]
default_lang: "fi"
exclude_from_localization: ["javascript", "images", "css", "assets", "favicon.ico", "site.webmanifest", "CNAME", "sitemap.xml", "sitemap.xsl"]
parallel_localization: true

sass:
  sourcemap: never

# Exclude files from the build
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - "*.sh"
  - CONTENT_GUIDE.md
  - CONTEXT.md
  - .claude
  - docs
  - guides.html

# =============================================================================
# SEO SETTINGS
# =============================================================================
# These help search engines understand your site

# For Google and other search engines
google_analytics: ""  # Add your GA tracking ID when ready

# Open Graph defaults
og_image: "/assets/images/og/og-default.webp"
